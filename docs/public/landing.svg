<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pcbBg" x1="80" y1="120" x2="620" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#27B568"/>
      <stop offset="1" stop-color="#14643D"/>
    </linearGradient>
    <linearGradient id="chipBg" x1="240" y1="280" x2="500" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#183C3A"/>
      <stop offset="1" stop-color="#0E1E1D"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="980" y1="130" x2="1460" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4E98FF"/>
      <stop offset="1" stop-color="#0E57DF"/>
    </linearGradient>
    <linearGradient id="blueArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8AC4FF" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#56A4FF"/>
      <stop offset="1" stop-color="#1664F1"/>
    </linearGradient>
    <linearGradient id="greenArrow" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#98F0B4" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#2DB36C"/>
      <stop offset="1" stop-color="#176B3E"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0D223C" flood-opacity="0.20"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ffffff" flood-opacity="0.18"/>
    </filter>
    <style>
      .trace{stroke:#5CE38F;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;opacity:.72}
      .trace2{stroke:#2D7BFF;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;opacity:.8}
      .gold{fill:#F4C34F}
      .smallChip{fill:#142B2A;stroke:#214E49;stroke-width:3}
      .smallPin{fill:#F4D36C}
      .label{font-family: Inter, Arial, sans-serif; font-weight: 800; letter-spacing: .5px}
      .pill{font-family: Inter, Arial, sans-serif; font-weight: 800; letter-spacing: 1px}
    </style>
  </defs>

  <!-- Left PCB module -->
  <g filter="url(#softShadow)">
    <rect x="70" y="160" width="560" height="560" rx="42" fill="url(#pcbBg)"/>
    <rect x="82" y="172" width="536" height="536" rx="34" stroke="#59D287" stroke-opacity="0.5" stroke-width="6"/>
    <circle cx="135" cy="225" r="25" class="gold"/>
    <circle cx="135" cy="225" r="11" fill="#166A40"/>
    <circle cx="565" cy="225" r="25" class="gold"/>
    <circle cx="565" cy="225" r="11" fill="#166A40"/>
    <circle cx="135" cy="655" r="25" class="gold"/>
    <circle cx="135" cy="655" r="11" fill="#166A40"/>
    <circle cx="565" cy="655" r="25" class="gold"/>
    <circle cx="565" cy="655" r="11" fill="#166A40"/>

    <!-- PCB traces -->
    <path class="trace" d="M185 240H220V305H255"/>
    <path class="trace" d="M210 290H245V350H255"/>
    <path class="trace" d="M170 390H230V390H255"/>
    <path class="trace" d="M170 500H215V470H255"/>
    <path class="trace" d="M195 585H230V540H255"/>
    <path class="trace" d="M510 240H470V305H435"/>
    <path class="trace" d="M525 320H470V350H435"/>
    <path class="trace" d="M540 390H470H435"/>
    <path class="trace" d="M520 500H470V470H435"/>
    <path class="trace" d="M500 585H460V540H435"/>
    <path class="trace" d="M318 220V255"/>
    <path class="trace" d="M382 220V255"/>
    <path class="trace" d="M318 625V585"/>
    <path class="trace" d="M382 625V585"/>

    <!-- Side components -->
    <g>
      <rect x="178" y="250" width="62" height="30" rx="8" class="smallChip"/>
      <rect x="147" y="378" width="45" height="45" rx="10" class="smallChip"/>
      <rect x="166" y="551" width="56" height="32" rx="8" class="smallChip"/>
      <rect x="458" y="250" width="62" height="30" rx="8" class="smallChip"/>
      <rect x="483" y="376" width="45" height="45" rx="10" class="smallChip"/>
      <rect x="452" y="549" width="56" height="32" rx="8" class="smallChip"/>
      <rect x="275" y="200" width="80" height="26" rx="8" class="smallChip"/>
      <rect x="410" y="200" width="80" height="26" rx="8" class="smallChip"/>
      <rect x="275" y="640" width="80" height="26" rx="8" class="smallChip"/>
      <rect x="410" y="640" width="80" height="26" rx="8" class="smallChip"/>
    </g>

    <!-- Chip -->
    <rect x="255" y="300" width="180" height="180" rx="24" fill="url(#chipBg)" stroke="#2F675B" stroke-width="6" filter="url(#innerGlow)"/>
    <text x="345" y="420" text-anchor="middle" fill="white" font-size="92" class="label">AI</text>

    <!-- Pins -->
    <g>
      <rect x="270" y="276" width="12" height="28" rx="4" class="smallPin"/>
      <rect x="296" y="276" width="12" height="28" rx="4" class="smallPin"/>
      <rect x="322" y="276" width="12" height="28" rx="4" class="smallPin"/>
      <rect x="348" y="276" width="12" height="28" rx="4" class="smallPin"/>
      <rect x="374" y="276" width="12" height="28" rx="4" class="smallPin"/>
      <rect x="400" y="276" width="12" height="28" rx="4" class="smallPin"/>
      <rect x="270" y="480" width="12" height="28" rx="4" class="smallPin"/>
      <rect x="296" y="480" width="12" height="28" rx="4" class="smallPin"/>
      <rect x="322" y="480" width="12" height="28" rx="4" class="smallPin"/>
      <rect x="348" y="480" width="12" height="28" rx="4" class="smallPin"/>
      <rect x="374" y="480" width="12" height="28" rx="4" class="smallPin"/>
      <rect x="400" y="480" width="12" height="28" rx="4" class="smallPin"/>

      <rect x="231" y="315" width="28" height="12" rx="4" class="smallPin"/>
      <rect x="231" y="341" width="28" height="12" rx="4" class="smallPin"/>
      <rect x="231" y="367" width="28" height="12" rx="4" class="smallPin"/>
      <rect x="231" y="393" width="28" height="12" rx="4" class="smallPin"/>
      <rect x="231" y="419" width="28" height="12" rx="4" class="smallPin"/>
      <rect x="231" y="445" width="28" height="12" rx="4" class="smallPin"/>

      <rect x="431" y="315" width="28" height="12" rx="4" class="smallPin"/>
      <rect x="431" y="341" width="28" height="12" rx="4" class="smallPin"/>
      <rect x="431" y="367" width="28" height="12" rx="4" class="smallPin"/>
      <rect x="431" y="393" width="28" height="12" rx="4" class="smallPin"/>
      <rect x="431" y="419" width="28" height="12" rx="4" class="smallPin"/>
      <rect x="431" y="445" width="28" height="12" rx="4" class="smallPin"/>
    </g>

    <!-- Decorative pads -->
    <g fill="#F4C34F" opacity="0.95">
      <circle cx="205" cy="230" r="6"/><circle cx="232" cy="230" r="6"/>
      <circle cx="185" cy="470" r="6"/><circle cx="185" cy="500" r="6"/>
      <circle cx="505" cy="470" r="6"/><circle cx="505" cy="500" r="6"/>
      <circle cx="520" cy="280" r="6"/><circle cx="520" cy="305" r="6"/>
      <circle cx="518" cy="560" r="6"/><circle cx="545" cy="560" r="6"/>
    </g>
