  <!-- Center flows -->
  <g>
    <path class="trace2" d="M670 265H735L800 330H930"/>
    <circle cx="680" cy="265" r="13" fill="#F5FBFF" stroke="#3B95FF" stroke-width="7"/>
    <circle cx="930" cy="330" r="13" fill="#F5FBFF" stroke="#3B95FF" stroke-width="7"/>
    <path class="trace2" d="M670 360H760L825 315H910"/>
    <circle cx="910" cy="315" r="11" fill="#F5FBFF" stroke="#3B95FF" stroke-width="6"/>
    <path d="M645 402H890" stroke="url(#blueArrow)" stroke-width="26" stroke-linecap="round"/>
    <path d="M890 402L850 370V434L890 402Z" fill="#1664F1"/>
    <rect x="703" y="374" width="16" height="16" rx="3" fill="#A9D2FF" opacity="0.7"/>
    <rect x="730" y="374" width="16" height="16" rx="3" fill="#6CB2FF" opacity="0.85"/>
    <rect x="757" y="374" width="16" height="16" rx="3" fill="#4A9BFF"/>

    <path d="M885 530H640" stroke="url(#greenArrow)" stroke-width="26" stroke-linecap="round"/>
    <path d="M640 530L680 498V562L640 530Z" fill="#176B3E"/>
    <rect x="820" y="504" width="16" height="16" rx="3" fill="#C5F4D2" opacity="0.7"/>
    <rect x="847" y="504" width="16" height="16" rx="3" fill="#86E0A0" opacity="0.85"/>
    <rect x="874" y="504" width="16" height="16" rx="3" fill="#2DB36C"/>

    <path class="trace" d="M690 620H760L820 675H925"/>
    <path class="trace" d="M690 670H745L810 720H925"/>
    <circle cx="680" cy="620" r="10" fill="#176B3E"/>
    <circle cx="680" cy="670" r="10" fill="#176B3E"/>
    <circle cx="925" cy="720" r="10" fill="#F5FFF7" stroke="#2DA25E" stroke-width="5"/>
  </g>

  <!-- Right cloud card -->
  <g filter="url(#softShadow)">
    <rect x="970" y="170" width="500" height="540" rx="46" fill="url(#blueCard)"/>
    <rect x="985" y="185" width="470" height="510" rx="36" stroke="#8AC4FF" stroke-opacity="0.38" stroke-width="6"/>

    <!-- Cloud icon -->
    <path d="M1180 290C1198 250 1232 230 1270 230C1320 230 1362 264 1368 313C1401 317 1428 345 1428 379C1428 417 1397 448 1359 448H1190C1138 448 1096 406 1096 354C1096 304 1137 262 1187 262C1185 271 1182 279 1180 290Z" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="1188" cy="416" r="24" fill="none" stroke="white" stroke-width="14"/>
    <path d="M1212 414L1285 375" stroke="white" stroke-width="14" stroke-linecap="round"/>
    <circle cx="1289" cy="372" r="10" fill="white"/>

    <text x="1220" y="530" text-anchor="middle" fill="white" font-size="92" class="label" style="font-style:italic">EasyEDA</text>

    <rect x="1125" y="570" width="190" height="96" rx="24" fill="white" fill-opacity="0.96"/>
    <text x="1220" y="634" text-anchor="middle" fill="#1C65F5" font-size="58" class="pill">MCP</text>

    <!-- faint circuitry -->
    <path d="M1345 628H1395V654H1440" stroke="#8EC1FF" stroke-width="5" opacity="0.25" stroke-linecap="round"/>
    <path d="M1330 655H1382V685" stroke="#8EC1FF" stroke-width="5" opacity="0.25" stroke-linecap="round"/>
    <circle cx="1440" cy="654" r="6" fill="#B9D8FF" opacity="0.3"/>
    <circle cx="1382" cy="685" r="6" fill="#B9D8FF" opacity="0.3"/>
  </g>
</svg>
