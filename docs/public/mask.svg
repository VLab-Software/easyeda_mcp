<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090f20"/>
      <stop offset="60%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#020306"/>
    </linearGradient>

    <!-- Outer Fine Border Gradient -->
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3f6d" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#141c30" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f1524" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Chat Bubble Bridge Gradient (AI to EDA) -->
    <linearGradient id="bridgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/> <!-- Pink/Magenta AI side -->
      <stop offset="30%" stop-color="#d946ef"/> <!-- Purple transit -->
      <stop offset="70%" stop-color="#3b82f6"/> <!-- Electric Blue bridge -->
      <stop offset="100%" stop-color="#10b981"/> <!-- Emerald EDA/PCB side -->
    </linearGradient>

    <!-- IC Chip Gradient -->
    <linearGradient id="chipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2542"/>
      <stop offset="100%" stop-color="#0d1324"/>
    </linearGradient>

    <!-- Gold Plating Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe259"/>
      <stop offset="100%" stop-color="#ffa751"/>
    </linearGradient>

    <!-- Neon Teal/Cyan Gradient -->
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 1. Background Card -->
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)"/>
  <rect x="6" y="6" width="500" height="500" rx="114" fill="none" stroke="url(#borderGradient)" stroke-width="3"/>

  <!-- 2. Schematic Blueprint Grid (Faint) -->
  <g opacity="0.12">
    <!-- Concentric Target Circles -->
    <circle cx="256" cy="210" r="160" stroke="#4facfe" stroke-width="1.5" stroke-dasharray="4,8"/>
    <circle cx="256" cy="210" r="210" stroke="#4facfe" stroke-width="1" stroke-dasharray="2,12"/>
    
    <!-- Coordinate Crosshairs -->
    <line x1="256" y1="40" x2="256" y2="380" stroke="#4facfe" stroke-width="1" stroke-dasharray="6,6"/>
    <line x1="60" y1="210" x2="452" y2="210" stroke="#4facfe" stroke-width="1" stroke-dasharray="6,6"/>
    
    <!-- Diagonal Construction Lines -->
    <line x1="110" y1="64" x2="402" y2="356" stroke="#4facfe" stroke-width="0.8" stroke-dasharray="3,9"/>
    <line x1="110" y1="356" x2="402" y2="64" stroke="#4facfe" stroke-width="0.8" stroke-dasharray="3,9"/>
  </g>

  <!-- 3. PCB Copper Circuit Traces (Back Layer) -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Trace 1: Top-Left with Resistor -->
    <path d="M 226 150 V 130 H 180" stroke="url(#cyanGradient)" stroke-width="4"/>
    <path d="M 150 130 H 132 A 20 20 0 0 0 112 150 V 170" stroke="url(#cyanGradient)" stroke-width="4"/>
    
    <!-- Trace 2: Bottom-Right with Capacitor -->
    <path d="M 286 270 V 290 H 340" stroke="url(#bridgeGradient)" stroke-width="4"/>
    <path d="M 346 290 H 380 A 20 20 0 0 0 400 270 V 250" stroke="url(#bridgeGradient)" stroke-width="4"/>

    <!-- Ground Trace and Symbol -->
    <path d="M 246 270 V 300" stroke="url(#goldGradient)" stroke-width="4"/>
    <line x1="234" y1="300" x2="258" y2="300" stroke="url(#goldGradient)" stroke-width="3"/>
    <line x1="240" y1="305" x2="252" y2="305" stroke="url(#goldGradient)" stroke-width="3"/>
    <line x1="245" y1="310" x2="247" y2="310" stroke="url(#goldGradient)" stroke-width="3"/>

    <!-- RF Antenna Trace (Top) -->
    <path d="M 266 150 V 120 H 280 L 292 108" stroke="url(#goldGradient)" stroke-width="4"/>
  </g>

  <!-- 4. Vias & Passive Electronic Components -->
  <!-- Resistor (Top-Left) -->
  <rect x="150" y="124" width="30" height="12" rx="3" fill="#141d34" stroke="url(#cyanGradient)" stroke-width="2" filter="url(#glow)"/>
  <rect x="156" y="125" width="3" height="10" fill="#ffa751"/>
  <rect x="163" y="125" width="3" height="10" fill="#f43f5e"/>
  <rect x="170" y="125" width="3" height="10" fill="#10b981"/>

  <!-- Capacitor Plates (Bottom-Right) -->
  <line x1="340" y1="280" x2="340" y2="300" stroke="url(#bridgeGradient)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="346" y1="280" x2="346" y2="300" stroke="url(#bridgeGradient)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Vias (Solder Points / Nodes) -->
  <circle cx="226" cy="130" r="5" fill="#ffffff" stroke="url(#cyanGradient)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="132" cy="130" r="5" fill="#ffffff" stroke="url(#cyanGradient)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="286" cy="290" r="5" fill="#ffffff" stroke="url(#bridgeGradient)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="380" cy="290" r="5" fill="#ffffff" stroke="url(#bridgeGradient)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="292" cy="108" r="5" fill="#ffffff" stroke="url(#goldGradient)" stroke-width="2" filter="url(#glow)"/>

  <!-- Data Stream Glowing Packets -->
  <circle cx="140" cy="130" r="3" fill="#ffffff" filter="url(#strongGlow)"/>
  <circle cx="360" cy="290" r="3" fill="#ffffff" filter="url(#strongGlow)"/>

  <!-- 5. Glowing Chat-Bubble Board Edge -->
  <path d="M 140 100 H 372 A 28 28 0 0 1 400 128 V 292 A 28 28 0 0 1 372 320 H 220 L 150 370 L 170 320 H 140 A 28 28 0 0 1 112 292 V 128 A 28 28 0 0 1 140 100 Z" 
        fill="none" stroke="url(#bridgeGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <path d="M 140 100 H 372 A 28 28 0 0 1 400 128 V 292 A 28 28 0 0 1 372 320 H 220 L 150 370 L 170 320 H 140 A 28 28 0 0 1 112 292 V 128 A 28 28 0 0 1 140 100 Z" 
        fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- Solder Pad Accents -->
  <circle cx="256" cy="100" r="6" fill="#ffe259" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
  <circle cx="400" cy="210" r="6" fill="#00f2fe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
  <circle cx="112" cy="210" r="6" fill="#f43f5e" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>

  <!-- 6. Central Microcontroller -->
  <!-- Chip Package -->
  <rect x="211" y="165" width="90" height="90" rx="18" fill="url(#chipGradient)" stroke="#22335c" stroke-width="3" filter="url(#glow)"/>
  <rect x="217" y="171" width="78" height="78" rx="12" fill="none" stroke="#2c4075" stroke-dasharray="6,4" opacity="0.6"/>

  <!-- Metal Pins -->
  <!-- Top -->
  <line x1="226" y1="165" x2="226" y2="150" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <line x1="246" y1="165" x2="246" y2="150" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <line x1="266" y1="165" x2="266" y2="150" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <line x1="286" y1="165" x2="286" y2="150" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <!-- Bottom -->
  <line x1="226" y1="255" x2="226" y2="270" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <line x1="246" y1="255" x2="246" y2="270" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <line x1="266" y1="255" x2="266" y2="270" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <line x1="286" y1="255" x2="286" y2="270" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <!-- Left -->
  <line x1="211" y1="180" x2="196" y2="180" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <line x1="211" y1="200" x2="196" y2="200" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <line x1="211" y1="220" x2="196" y2="220" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <line x1="211" y1="240" x2="196" y2="240" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <!-- Right -->
  <line x1="301" y1="180" x2="316" y2="180" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <line x1="301" y1="200" x2="316" y2="200" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <line x1="301" y1="220" x2="316" y2="220" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
  <line x1="301" y1="240" x2="316" y2="240" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>

  <!-- 7. AI Neural Network Pattern on Chip Surface -->
  <g filter="url(#glow)">
    <!-- Connections -->
    <line x1="236" y1="195" x2="276" y2="195" stroke="#00f2fe" stroke-width="1.5" opacity="0.7"/>
    <line x1="236" y1="195" x2="246" y2="225" stroke="#00f2fe" stroke-width="1.5" opacity="0.7"/>
    <line x1="276" y1="195" x2="266" y2="225" stroke="#00f2fe" stroke-width="1.5" opacity="0.7"/>
    <line x1="246" y1="225" x2="266" y2="225" stroke="#00f2fe" stroke-width="1.5" opacity="0.7"/>
    <line x1="236" y1="195" x2="266" y2="225" stroke="#00f2fe" stroke-width="1" opacity="0.4"/>
    <line x1="276" y1="195" x2="246" y2="225" stroke="#00f2fe" stroke-width="1" opacity="0.4"/>

    <!-- Nodes -->
    <circle cx="236" cy="195" r="4.5" fill="#ffffff" stroke="#00f2fe" stroke-width="1.5"/>
    <circle cx="276" cy="195" r="4.5" fill="#ffffff" stroke="#00f2fe" stroke-width="1.5"/>
    <circle cx="246" cy="225" r="4.5" fill="#ffffff" stroke="#00f2fe" stroke-width="1.5"/>
    <circle cx="266" cy="225" r="4.5" fill="#ffffff" stroke="#00f2fe" stroke-width="1.5"/>
  </g>

  <!-- Pin 1 Dot -->
  <circle cx="225" cy="179" r="2.5" fill="#ffe259"/>

</svg>
